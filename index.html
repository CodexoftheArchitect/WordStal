<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WORDSTYL">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>WORDSTYL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive, sans-serif;
    background: linear-gradient(135deg, #ffd6f5, #d4b3ff, #b3d9ff, #b8e6ff, #ffd6e8);
    background-size: 400% 400%;
    animation: bgShift 22s ease infinite;
    color: #4a2c5a;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    position: relative;
    transition: background 1.2s ease;
  }
  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .deco {
    position: fixed;
    pointer-events: none;
    opacity: 0.78;
    z-index: 1;
    animation: float 9s ease-in-out infinite;
    filter: drop-shadow(0 4px 6px rgba(180,120,220,0.25));
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-22px) rotate(6deg); }
  }

  .game {
    position: relative;
    z-index: 10;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 8px 8px;
    max-width: 520px;
    margin: 0 auto;
  }

  h1 {
    font-size: clamp(1.9rem, 6.5vw, 2.8rem);
    text-align: center;
    margin: 2px 0 0;
    background: linear-gradient(90deg, #ff6bcb, #b14eff, #4ea8ff, #4eff9a, #ffd84e, #ff8b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 900;
    letter-spacing: 3px;
    text-shadow: 0 2px 4px rgba(255,255,255,0.4);
  }
  .subtitle {
    font-size: clamp(0.75rem, 2.2vw, 0.95rem);
    color: #8a3ec7;
    text-align: center;
    margin: 0 0 2px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .grid {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 5px;
    margin: 4px 0;
  }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .tile {
    width: clamp(46px, 11.5vw, 58px);
    height: clamp(46px, 11.5vw, 58px);
    background: rgba(255,255,255,0.7);
    border: 3px solid #d4b3ff;
    border-radius: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.5rem, 4.5vw, 1.9rem);
    font-weight: 900;
    color: #4a2c5a;
    text-transform: uppercase;
    transition: transform 0.2s, background 0.3s, color 0.3s, border-color 0.3s;
    box-shadow: 0 2px 8px rgba(180, 120, 220, 0.25);
  }
  .tile.filled {
    border-color: #b14eff;
    transform: scale(1.06);
    animation: pop 0.22s ease;
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.18); }
    100% { transform: scale(1.06); }
  }
  .tile.flipping { animation: flipReveal 0.55s ease forwards; }
  @keyframes flipReveal {
    0% { transform: rotateX(0); }
    50% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }
  .tile.correct {
    background: linear-gradient(135deg, #7dffac, #4ed881);
    color: white;
    border-color: #2eb55c;
    box-shadow: 0 0 22px #7dffac, 0 0 44px rgba(125,255,172,0.55);
  }
  .tile.present {
    background: linear-gradient(135deg, #ffe066, #ffae3d);
    color: white;
    border-color: #d49000;
    box-shadow: 0 0 22px #ffe066;
  }
  .tile.absent {
    background: rgba(180, 160, 200, 0.55);
    color: white;
    border-color: #9d88b0;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
    margin: 4px 0 2px;
    width: 100%;
  }
  .btn-check {
    background: linear-gradient(135deg, #ffd84e, #ff6bcb 50%, #b14eff);
    color: white;
    border: none;
    border-radius: 28px;
    padding: 11px 44px;
    font-family: inherit;
    font-weight: 900;
    font-size: clamp(1.05rem, 3.5vw, 1.25rem);
    letter-spacing: 3px;
    box-shadow: 0 4px 0 #8a3ec7, 0 6px 14px rgba(255,107,203,0.5), inset 0 -2px 6px rgba(255,255,255,0.3);
    cursor: pointer;
    text-shadow: 0 1px 3px rgba(0,0,0,0.25);
    transition: transform 0.08s, box-shadow 0.08s;
    animation: glowPulse 2.2s ease-in-out infinite;
  }
  .btn-check:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #8a3ec7;
    animation: none;
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 4px 0 #8a3ec7, 0 6px 14px rgba(255,107,203,0.5), inset 0 -2px 6px rgba(255,255,255,0.3); }
    50% { box-shadow: 0 4px 0 #8a3ec7, 0 6px 22px rgba(255,216,78,0.85), inset 0 -2px 6px rgba(255,255,255,0.3); }
  }
  .btn-reset {
    background: linear-gradient(135deg, #c9b8d8, #b29ec7);
    color: white;
    border: none;
    border-radius: 18px;
    padding: 5px 18px;
    font-family: inherit;
    font-weight: 700;
    font-size: clamp(0.78rem, 2.5vw, 0.9rem);
    box-shadow: 0 2px 0 #7a6688;
    cursor: pointer;
  }
  .btn-reset:active { transform: translateY(2px); box-shadow: 0 0 0 #7a6688; }

  .keyboard {
    display: flex;
    flex-direction: column;
    gap: 5px;
    width: 100%;
    margin-top: auto;
    padding-bottom: 4px;
  }
  .krow { display: flex; gap: 4px; justify-content: center; }
  .key {
    flex: 1;
    height: clamp(40px, 7.5vh, 52px);
    border: none;
    border-radius: 10px;
    background: linear-gradient(180deg, #ffffff, #f3e6ff);
    color: #4a2c5a;
    font-weight: 900;
    font-size: clamp(0.95rem, 3.5vw, 1.15rem);
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 3px 0 #c9a8e6, 0 4px 8px rgba(180,120,220,0.3);
    transition: transform 0.08s, box-shadow 0.08s;
    text-transform: uppercase;
  }
  .key:active { transform: translateY(2px); box-shadow: 0 1px 0 #c9a8e6; }
  .key.wide { flex: 1.55; font-size: clamp(0.85rem, 3vw, 1.05rem); }
  .key.correct { background: linear-gradient(180deg, #7dffac, #4ed881); color: white; box-shadow: 0 3px 0 #2eb55c; }
  .key.present { background: linear-gradient(180deg, #ffe066, #ffae3d); color: white; box-shadow: 0 3px 0 #d49000; }
  .key.absent  { background: linear-gradient(180deg, #c9b8d8, #a896b8); color: white; box-shadow: 0 3px 0 #7a6688; }

  .sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 1.5rem;
    z-index: 100;
    animation: sparkleFly 1.1s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes sparkleFly {
    0%   { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
    40%  { transform: translate(var(--dx), var(--dy)) scale(1.3) rotate(180deg); opacity: 1; }
    100% { transform: translate(calc(var(--dx)*1.6), calc(var(--dy)*1.6)) scale(0) rotate(360deg); opacity: 0; }
  }

  .wand {
    position: fixed;
    font-size: 2.6rem;
    pointer-events: none;
    z-index: 99;
    transition: left 0.32s ease-in-out, top 0.32s ease-in-out;
    filter: drop-shadow(0 0 8px #ffd84e);
    animation: wiggle 0.5s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-15deg); }
    50% { transform: rotate(10deg); }
  }

  .celebration {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    display: none;
  }
  .celebration.show { display: block; }
  .rainbow {
    position: absolute;
    top: 22%;
    left: 50%;
    font-size: clamp(4rem, 14vw, 7rem);
    transform: translateX(-50%);
    animation: bigPop 1.2s ease;
  }
  .winText {
    position: absolute;
    top: 36%;
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 900;
    background: linear-gradient(90deg, #ff6bcb, #b14eff, #4ea8ff, #4eff9a, #ffd84e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 4px 8px rgba(255,255,255,0.6);
    animation: bigPopText 1.1s ease;
  }
  @keyframes bigPop {
    0%   { transform: translateX(-50%) scale(0) rotate(-30deg); opacity: 0; }
    60%  { transform: translateX(-50%) scale(1.25) rotate(8deg); opacity: 1; }
    100% { transform: translateX(-50%) scale(1) rotate(0); opacity: 1; }
  }
  @keyframes bigPopText {
    0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
    60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .floater {
    position: fixed;
    font-size: clamp(2.5rem, 7vw, 4rem);
    pointer-events: none;
    z-index: 201;
    animation: dance 3s ease-in-out forwards;
  }
  @keyframes dance {
    0% { transform: translate(-100px, 110vh) rotate(0); opacity: 0; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translate(110vw, -120px) rotate(540deg); opacity: 0; }
  }

  .message {
    min-height: 24px;
    font-size: clamp(0.92rem, 2.8vw, 1.05rem);
    font-weight: 700;
    color: #b14eff;
    text-align: center;
    margin: 2px 0;
    text-shadow: 0 1px 2px rgba(255,255,255,0.7);
  }

  .shake { animation: shake 0.45s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .deco.big { font-size: clamp(2rem, 5.5vw, 2.8rem); }
  .deco.med { font-size: clamp(1.5rem, 4vw, 2rem); }
  .deco.sm  { font-size: clamp(1rem, 2.5vw, 1.4rem); opacity: 0.55; }
</style>
</head>

<div id="decoLayer"></div>

<div class="game">
  <h1>💎 WORDSTYL 💎</h1>
  <div class="subtitle">✨ a magical spell for Crystal ✨</div>
  <div class="message" id="msg">Guess the magic word! 🪄</div>
  <div class="grid" id="grid"></div>
  <div class="actions">
    <button class="btn-check" id="checkBtn">✨ CHECK ✨</button>
    <button class="btn-reset" id="newGame">🪄 New Spell</button>
  </div>
  <div class="keyboard" id="kb"></div>
</div>

<div class="celebration" id="celebration">
  <div class="rainbow">🌈</div>
  <div class="winText" id="winText">You did it! ✨</div>
</div>

  const KIND_SPARKLES = ["✨","🌟","💫","⭐","🪄","💖"];
  const WIZ_MSGS = ["Magical! ✨","Sparkly! 🌟","Beautiful! 🦄","You're amazing! 💖","Wow! ✨","So magical! 🌈","Brilliant spellwork! 🪄","Pure magic! 💫","Crystal-perfect! 💎"];
  const ENCOURAGE = ["Keep going! ✨","You can do it! 🌟","Almost there! 🦄","Try again! 🌈","The magic is close! 🧚","Cast another spell! 🪄","You're so close! 💖"];

  let target, guesses, current, gameOver, busy;
  let keyState = {};
  let currentTheme;

  function pickTheme() {
    let next;
    do { next = THEMES[Math.floor(Math.random()*THEMES.length)]; }
    while (currentTheme && next.name === currentTheme.name && THEMES.length > 1);
    currentTheme = next;
    document.body.style.background = next.bg;
    document.body.style.backgroundSize = '400% 400%';
    renderDecorations();
  }

  function renderDecorations() {
    const layer = document.getElementById('decoLayer');
    layer.innerHTML = '';
    // Fixed slot positions around the edges (avoiding center where game is)
    const slots = [
      { top:'4%',  left:'3%',   size:'big' },
      { top:'7%',  right:'4%',  size:'big' },
      { top:'22%', left:'1%',   size:'med' },
      { top:'26%', right:'2%',  size:'big' },
      { top:'48%', left:'1.5%', size:'med' },
      { top:'52%', right:'2%',  size:'big' },
      { bottom:'32%', left:'3%',  size:'big' },
      { bottom:'36%', right:'3%', size:'med' },
      { top:'14%', left:'48%', size:'sm' },
      { top:'42%', left:'52%', size:'sm' },
      { bottom:'8%', left:'30%', size:'sm' },
      { bottom:'10%', right:'30%', size:'sm' }
    ];
    const pool = [...currentTheme.decos];
    // shuffle
    for (let i = pool.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    slots.forEach((slot, i) => {
      const d = document.createElement('div');
      d.className = 'deco ' + slot.size;
      Object.entries(slot).forEach(([k,v]) => {
        if (k !== 'size') d.style[k] = v;
      });
      d.style.animationDelay = (Math.random()*4).toFixed(2)+'s';
      d.textContent = pool[i % pool.length];
      layer.appendChild(d);
    });
  }

  function pickWord() {
    // ~10% chance the answer is a magical word, otherwise a normal word
    if (Math.random() < 0.10) {
      return MAGIC_WORDS[Math.floor(Math.random()*MAGIC_WORDS.length)];
    }
    return NORMAL_WORDS[Math.floor(Math.random()*NORMAL_WORDS.length)];
  }

  function newGame() {
    target = pickWord();
    guesses = [];
    current = "";
    gameOver = false;
    busy = false;
    keyState = {};
    pickTheme();
    renderGrid();
    renderKeys();
    setMsg("Guess the magic word! 🪄");
    document.getElementById('celebration').classList.remove('show');
  }

  function renderGrid() {
    const g = document.getElementById('grid');
    g.innerHTML = "";
    for (let r = 0; r < 6; r++) {
      const row = document.createElement('div');
      row.className = 'row';
      row.id = 'row-'+r;
      for (let c = 0; c < 5; c++) {
        const t = document.createElement('div');
        t.className = 'tile';
        t.id = `t-${r}-${c}`;
        let ch = "";
        if (r < guesses.length) ch = guesses[r].word[c];
        else if (r === guesses.length) ch = current[c] || "";
        t.textContent = ch;
        if (ch && r === guesses.length) t.classList.add('filled');
        if (r < guesses.length) t.classList.add(guesses[r].marks[c]);
        row.appendChild(t);
      }
      g.appendChild(row);
    }
  }

  // Keyboard layout — no ENTER key, the big CHECK button is the submit
  const KEYS = [
    "QWERTYUIOP".split(""),
    "ASDFGHJKL".split(""),
    ["Z","X","C","V","B","N","M","BACK"]
  ];

  function renderKeys() {
    const kb = document.getElementById('kb');
    kb.innerHTML = "";
    for (const row of KEYS) {
      const rd = document.createElement('div');
      rd.className = 'krow';
      for (const k of row) {
        const b = document.createElement('button');
        b.className = 'key' + (k==='BACK'?' wide':'') + (keyState[k]?' '+keyState[k]:'');
        b.textContent = k === "BACK" ? "⌫" : k;
        b.onclick = () => press(k);
        rd.appendChild(b);
      }
      kb.appendChild(rd);
    }
  }

  function setMsg(t, color) {
    const m = document.getElementById('msg');
    m.textContent = t;
    m.style.color = color || '#b14eff';
  }

  function press(k) {
    if (gameOver || busy) return;
    if (k === "BACK") {
      current = current.slice(0,-1);
      renderGrid();
    } else if (k === "ENTER") {
      submit();
    } else if (current.length < 5) {
      current += k;
      renderGrid();
      const tile = document.getElementById(`t-${guesses.length}-${current.length-1}`);
      if (tile) burstSparkle(tile, 4);
    }
  }

  function submit() {
    if (gameOver || busy) return;
    if (current.length < 5) {
      shakeRow();
      setMsg("Need 5 letters! ✨");
      return;
    }
    if (!ALL_WORDS.includes(current)) {
      shakeRow();
      setMsg("Hmm, not a word I know 🪄 try another!");
      return;
    }
    const word = current;
    const marks = scoreGuess(word, target);
    guesses.push({ word, marks });
    current = "";
    revealRow(guesses.length-1, word, marks);
  }

  function scoreGuess(g, t) {
    const marks = ["absent","absent","absent","absent","absent"];
    const tArr = t.split("");
    for (let i=0;i<5;i++) if (g[i]===tArr[i]) { marks[i]="correct"; tArr[i]=null; }
    for (let i=0;i<5;i++) {
      if (marks[i]==="correct") continue;
      const idx = tArr.indexOf(g[i]);
      if (idx !== -1) { marks[i]="present"; tArr[idx]=null; }
    }
    return marks;
  }

  function shakeRow() {
    const r = document.getElementById('row-'+guesses.length);
    if (r) { r.classList.add('shake'); setTimeout(()=>r.classList.remove('shake'),450); }
  }

  async function revealRow(rowIdx, word, marks) {
    busy = true;

    const wand = document.createElement('div');
    wand.className = 'wand';
    wand.textContent = '🪄';
    document.body.appendChild(wand);

    for (let i = 0; i < 5; i++) {
      const tile = document.getElementById(`t-${rowIdx}-${i}`);
      const rect = tile.getBoundingClientRect();
      wand.style.left = (rect.left + rect.width/2 - 22) + 'px';
      wand.style.top = (rect.top - 38) + 'px';
      await sleep(220);

      burstSparkle(tile, 5, null, true);

      tile.classList.add('flipping');
      await sleep(280);
      tile.classList.add(marks[i]);

      const order = {correct:3, present:2, absent:1};
      const ks = keyState[word[i]];
      if (!ks || order[marks[i]] > order[ks]) keyState[word[i]] = marks[i];

      const count = marks[i]==='correct' ? 16 : marks[i]==='present' ? 9 : 3;
      burstSparkle(tile, count, marks[i]);

      await sleep(140);
    }

    wand.remove();
    renderKeys();

    if (word === target) {
      gameOver = true;
      busy = false;
      celebrate();
    } else if (guesses.length >= 6) {
      gameOver = true;
      busy = false;
      setMsg(`The magic word was ${target} 🪄✨ Tap New Spell!`);
      friendlyWizardWave();
    } else {
      busy = false;
      setMsg(ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)]);
    }
  }

  function burstSparkle(el, n, mark, fromWand) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const chars = mark === 'correct' ? ["✨","🌟","💫","⭐","🌈"] :
                   mark === 'present' ? ["✨","💛","⭐","🌟"] :
                   fromWand ? ["✨","💫"] : ["✨"];
    for (let i = 0; i < n; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = chars[Math.floor(Math.random()*chars.length)];
      s.style.left = (cx-12)+'px';
      s.style.top = (cy-12)+'px';
      const angle = (Math.PI*2*i)/n + Math.random()*0.6;
      const dist = 50 + Math.random()*70;
      s.style.setProperty('--dx', Math.cos(angle)*dist+'px');
      s.style.setProperty('--dy', Math.sin(angle)*dist+'px');
      s.style.fontSize = (0.9 + Math.random()*0.9)+'rem';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(), 1200);
    }
  }

  function celebrate() {
    setMsg(WIZ_MSGS[Math.floor(Math.random()*WIZ_MSGS.length)]);
    document.getElementById('winText').textContent = "You did it! ✨";
    document.getElementById('celebration').classList.add('show');

    const chars = [...currentTheme.decos, '🦄','🧚','🌈','⭐','🪄','✨','🌟','💫','💖'];
    for (let i = 0; i < 18; i++) {
      setTimeout(() => {
        const f = document.createElement('div');
        f.className = 'floater';
        f.textContent = chars[Math.floor(Math.random()*chars.length)];
        f.style.left = (Math.random()*100)+'vw';
        f.style.top = (Math.random()*100)+'vh';
        f.style.animationDuration = (2.4 + Math.random()*2.2)+'s';
        document.body.appendChild(f);
        setTimeout(()=>f.remove(), 5500);
      }, i*130);
    }

    for (let i = 0; i < 65; i++) {
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = KIND_SPARKLES[Math.floor(Math.random()*KIND_SPARKLES.length)];
        s.style.left = (Math.random()*100)+'vw';
        s.style.top = (40 + Math.random()*30)+'vh';
        s.style.setProperty('--dx', ((Math.random()-0.5)*500)+'px');
        s.style.setProperty('--dy', ((Math.random()-0.5)*500)+'px');
        s.style.fontSize = (1+Math.random()*1.6)+'rem';
        document.body.appendChild(s);
        setTimeout(()=>s.remove(), 1200);
      }, i*42);
    }

    setTimeout(() => {
      document.getElementById('celebration').classList.remove('show');
    }, 4500);
  }

  function friendlyWizardWave() {
    const f = document.createElement('div');
    f.className = 'floater';
    f.textContent = '🧙‍♀️';
    f.style.left = '-100px';
    f.style.top = '60vh';
    f.style.animationDuration = '3.2s';
    document.body.appendChild(f);
    setTimeout(()=>f.remove(), 3500);
  }

  function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

  document.addEventListener('keydown', (e) => {
    if (gameOver || busy) {
      if (e.key === 'Enter' && gameOver) newGame();
      return;
    }
    if (e.key === 'Enter') press('ENTER');
    else if (e.key === 'Backspace') press('BACK');
    else if (/^[a-zA-Z]$/.test(e.key)) press(e.key.toUpperCase());
  });

  document.getElementById('checkBtn').onclick = () => press('ENTER');
  document.getElementById('newGame').onclick = newGame;

  newGame();
</script>
</body>
</html>
